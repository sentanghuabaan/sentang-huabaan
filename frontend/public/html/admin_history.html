<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin History - เส้นทางหัวบ้าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/stylecommon.css">
    <link rel="stylesheet" href="../css/styleadmin_location.css">
    <link rel="stylesheet" href="../css/styleadmin_addedit.css">
</head>

<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo-section"><img src="../image/logohuabaan2.png" class="admin-logo"></div>
            <nav class="menu">
                <a href="admin_dashboard.html" class="menu-item"><iconify-icon icon="mage:dashboard-fill"
                        class="menu-icon"></iconify-icon> Dashboard</a>
                <a href="admin_user.html" class="menu-item"><iconify-icon icon="basil:user-solid"
                        class="menu-icon"></iconify-icon> User</a>
                <a href="admin_otp.html" class="menu-item"><iconify-icon icon="teenyicons:otp-solid"
                        class="menu-icon"></iconify-icon> OTP</a>
                <a href="admin_location.html" class="menu-item"><iconify-icon icon="ion:location-sharp"
                        class="menu-icon"></iconify-icon> Location</a>
                <a href="admin_location_images.html" class="menu-item"><iconify-icon icon="mdi:image-location"
                        class="menu-icon"></iconify-icon> Location Images</a>
                <a href="admin_activity.html" class="menu-item"><iconify-icon icon="lets-icons:date-fill"
                        class="menu-icon"></iconify-icon> Activity</a>
                <a href="admin_activity_images.html" class="menu-item"><iconify-icon icon="material-symbols:imagesmode"
                        class="menu-icon"></iconify-icon> Activity Images</a>
                <a href="admin_history.html" class="menu-item active"><iconify-icon icon="mdi:history"
                        class="menu-icon"></iconify-icon> History</a>
                <a href="admin_history_gallery.html" class="menu-item"><iconify-icon icon="material-symbols:topic"
                        class="menu-icon"></iconify-icon> History Gallery</a>
                <a href="admin_videoar.html" class="menu-item"><iconify-icon icon="tdesign:view-in-ar-filled"
                        class="menu-icon"></iconify-icon> AR Content</a>
                <a href="admin_community_gallery.html" class="menu-item"><iconify-icon
                        icon="fluent:image-copy-28-filled" class="menu-icon"></iconify-icon> Community Gallery</a>
                <a href="admin_banners.html" class="menu-item"><iconify-icon icon="material-symbols:ad-units"
                        class="menu-icon"></iconify-icon> Banner Ads</a>
                <a href="admin_review.html" class="menu-item"><iconify-icon icon="material-symbols:rate-review"
                        class="menu-icon"></iconify-icon> Review</a>
                <a href="admin_map.html" class="menu-item"><iconify-icon icon="mdi:map-marker-radius"
                        class="menu-icon"></iconify-icon> Map</a>
                <a href="admin_travel_route.html" class="menu-item"><iconify-icon icon="mdi:map-outline"
                        class="menu-icon"></iconify-icon> Travel Route</a>
                <a href="admin_trip.html" class="menu-item"><iconify-icon icon="mdi:map-marker-path"
                        class="menu-icon"></iconify-icon> Trips</a>
                <a href="admin_trip_detail.html" class="menu-item"><iconify-icon
                        icon="streamline-ultimate:trip-road-bold" class="menu-icon"></iconify-icon> Trips Details</a>
                <a href="admin_report.html" class="menu-item"><iconify-icon icon="mdi:report"
                        class="menu-icon"></iconify-icon> Report</a>
                <a href="admin_activity_logs.html" class="menu-item">
                    <iconify-icon icon="mdi:note-edit" class="menu-icon"></iconify-icon> Activity Logs
                </a>
                <a href="admin_trash.html" class="menu-item trash-menu">
                    <iconify-icon icon="mdi:trash-can" class="menu-icon"></iconify-icon> Trash
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="divider"></div>
                <a href="javascript:void(0)" class="menu-item logout-btn" onclick="logoutAdmin()">
                    <iconify-icon icon="mdi:logout" class="menu-icon"></iconify-icon> Log Out
                </a>
            </div>
        </aside>

        <main class="content-area">
            <header class="top-bar">
                <div class="search-wrapper">
                    <iconify-icon icon="material-symbols:search-rounded" class="search-icon"></iconify-icon>
                    <input type="text" placeholder="search" id="hisSearch" onkeyup="searchTable()">
                </div>
                <div class="action-controls">
                    <button class="add-btn" onclick="openHistoryModal()">
                        <iconify-icon icon="mdi:add-bold"></iconify-icon> Add
                    </button>
                </div>
            </header>

            <div class="table-container">
                <div class="scroll-container">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th></th>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Content</th>
                                <th>Video URL</th>
                                <th>Order</th>
                            </tr>
                        </thead>
                        <tbody id="historyData"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'https://sentanghuabaan.com';

        const adminToken = localStorage.getItem('adminToken');
        if (!adminToken) {
            window.location.href = 'admin_login.html';
        }

        function searchTable() {
            let input = document.getElementById("hisSearch").value.toLowerCase();

            let rows = document.querySelectorAll("#historyData tr");

            rows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? "" : "none";
            });
        }
        async function fetchHistory() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/history`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.clear();
                    window.location.href = 'admin_login.html';
                    return;
                }

                const data = await response.json();
                const tableBody = document.getElementById('historyData');
                tableBody.innerHTML = data.map(item => `
                    <tr>
                        <td class="action-cell">
                            <button class="edit-btn-sm" onclick="openHistoryModal('${item.history_id}')"><iconify-icon icon="material-symbols:edit"></iconify-icon> Edit</button>
                            <button class="delete-btn-sm" onclick="deleteHistory('${item.history_id}')"><iconify-icon icon="material-symbols:delete"></iconify-icon> Delete</button>
                        </td>
                        <td>${item.history_id}</td>
                        <td class="truncate">${item.title}</td>
                        <td class="truncate">${item.content_text || '-'}</td>
                        <td class="url-text">${item.video_url || '-'}</td>
                        <td>${item.sequence_order}</td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function openHistoryModal(id = null) {
            const isEdit = id !== null;
            let data = {};

            try {
                if (isEdit) {
                    //ดึงข้อมูลรายตัวมา
                    const res = await fetch(`${API_BASE_URL}/api/history/${id}`, {
                        headers: { 'Authorization': `Bearer ${adminToken}` }
                    });
                    data = await res.json();
                } else {
                    // ดึงรหัส ID ล่าสุดมา
                    const res = await fetch(`${API_BASE_URL}/api/history/next-id`, {
                        headers: { 'Authorization': `Bearer ${adminToken}` }
                    });
                    const result = await res.json();
                    data.history_id = result.next_id;
                }

                await Swal.fire({
                    title: isEdit ? '✏️ แก้ไขประวัติ' : '📜 เพิ่มประวัติใหม่',
                    width: '700px',
                    html: `
                        <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; padding: 20px;">
                            <div class="form-group" style="display: flex; flex-direction: column;"><label>ID</label><input type="text" id="swal-id" class="cute-edit-input" value="${data.history_id || ''}" readonly></div>
                            <div class="form-group" style="display: flex; flex-direction: column; "><label>Order</label><input type="number" id="swal-order" class="cute-edit-input" value="${data.sequence_order || ''}"></div>
                            <div class="form-group" style="display: flex; flex-direction: column; grid-column: span 2;"><label>Title</label><input type="text" id="swal-title" class="cute-edit-input" value="${data.title || ''}"></div>
                            <div class="form-group" style="display: flex; flex-direction: column; grid-column: span 2;"><label>Content</label><textarea id="swal-content" class="cute-edit-input" style="height: 100px;">${data.content_text || ''}</textarea></div>
                            <div class="form-group" style="display: flex; flex-direction: column; grid-column: span 2;"><label>Video URL</label><input type="text" id="swal-video" class="cute-edit-input" value="${data.video_url || ''}"></div>
                        </div>
                    `,
                    customClass: { popup: 'cute-modal-style', title: 'cute-modal-title', confirmButton: 'cute-modal-button', cancelButton: 'cute-modal-button-cancel' },
                    buttonsStyling: false,
                    confirmButtonText: isEdit ? 'UPDATE' : 'ADD',
                    showCancelButton: true,
                    preConfirm: () => ({
                        history_id: document.getElementById('swal-id').value,
                        title: document.getElementById('swal-title').value,
                        content_text: document.getElementById('swal-content').value,
                        video_url: document.getElementById('swal-video').value,
                        sequence_order: document.getElementById('swal-order').value
                    })
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        const method = isEdit ? 'PUT' : 'POST';
                        const url = isEdit ? `${API_BASE_URL}/api/history/${id}` : `${API_BASE_URL}/api/history`;
                        const payload = { ...result.value, admin_id: localStorage.getItem('adminId') };

                        const res = await fetch(url, {
                            method,
                            headers: {
                                'Authorization': `Bearer ${adminToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });

                        if (res.ok) {
                            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', confirmButtonColor: '#BF7E46' });
                            fetchHistory();
                        } else {
                            Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: 'โปรดตรวจสอบสถานะความปลอดภัยหลังบ้าน' });
                        }
                    }
                });
            } catch (modalErr) { console.error("Modal Operation Error:", modalErr); }
        }

        async function deleteHistory(id) {
            const adminId = localStorage.getItem('adminId');

            Swal.fire({
                title: 'ยืนยันการลบ?',
                text: `ต้องการลบประวัติรหัส ${id} ใช่หรือไม่?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ใช่, ลบเลย!',
                confirmButtonColor: '#FF9A9A'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const response = await fetch(`${API_BASE_URL}/api/history/${id}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${adminToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ admin_id: adminId })
                    });

                    if (response.ok) {
                        Swal.fire('สำเร็จ', 'ข้อมูลถูกย้ายไปถังขยะแล้ว', 'success');
                        fetchHistory();
                    }
                }
            });
        }

        function logoutAdmin() {
            Swal.fire({
                title: 'ออกจากระบบ?',
                text: "คุณต้องการออกจากระบบจัดการใช่หรือไม่",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#BF7E46',
                cancelButtonColor: '#ccc',
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก',
                borderRadius: '20px'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminName');
                    window.location.href = 'admin_login.html';
                }
            });
        }
        window.onload = fetchHistory;
    </script>
</body>

</html>

                </a>
            </div>

        <main class="content-area">
            <header class="top-bar">
                <div class="search-wrapper">
                    <iconify-icon icon="material-symbols:search-rounded" class="search-icon"></iconify-icon>
                    <input type="text" placeholder="ค้นหาด้วยรหัสสถานที่ หรือ Image ID" id="imgSearch"
                        onkeyup="searchImageTable()">
                </div>
                <div class="action-controls">
                    <button class="add-btn" onclick="openImageModal()">
                        <iconify-icon icon="mdi:add-bold"></iconify-icon> Add Image
                    </button>
                </div>
            </header>

            <div class="table-container">
                <div class="scroll-container">
                    <table id="imageTable">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Image ID</th>
                                <th>Location ID</th>
                                <th>Image URL</th>
                            </tr>
                        </thead>
                        <tbody id="imageData">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';

        const adminToken = localStorage.getItem('adminToken');
        if (!adminToken) {
            window.location.href = 'admin_login.html';
        }

        // ฟังก์ชันค้นหา
        function searchImageTable() {
            let input = document.getElementById("imgSearch").value.toLowerCase();
            let rows = document.querySelectorAll("#imageData tr");
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
            });
        }

        function editImage(id) {
            window.location.href = `admin_edit_location_image.html?id=${id}`;
        }

        async function fetchImages() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/location-images`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.clear();
                    window.location.href = 'admin_login.html';
                    return;
                }

                const images = await response.json();
                const tableBody = document.getElementById('imageData');

                tableBody.innerHTML = images.map(img => `
                    <tr>
                        <td class="action-cell">
                            <button class="edit-btn-sm" onclick="openImageModal('${img.image_id}')">
                                <iconify-icon icon="material-symbols:edit"></iconify-icon> Edit
                            </button>
                            <button class="delete-btn-sm" onclick="deleteImage('${img.image_id}')">
                                <iconify-icon icon="material-symbols:delete"></iconify-icon> Delete
                            </button>
                        </td>
                        <td>${img.image_id}</td>
                        <td>${img.location_id}</td>
                        <td class="url-text">${img.image_url}</td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Error fetching images:", err); }
        }

        async function openImageModal(id = null) {
            const isEdit = id !== null;
            let imgData = { image_id: '', location_id: '', image_url: '' };

            try {
                // โหลดรายชื่อสถานที่มาทำชอยส์ Dropdown
                const locRes = await fetch(`${API_BASE_URL}/api/locations`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const locations = await locRes.json();
                let options = locations.map(l => `<option value="${l.location_id}">${l.location_name} (${l.location_id})</option>`).join('');

                if (!isEdit) {
                    const res = await fetch(`${API_BASE_URL}/api/location-images/next-id`, {
                        headers: { 'Authorization': `Bearer ${adminToken}` }
                    });
                    const data = await res.json();
                    imgData.image_id = data.next_id;
                } else {
                    const res = await fetch(`${API_BASE_URL}/api/location-images/${id}`, {
                        headers: { 'Authorization': `Bearer ${adminToken}` }
                    });
                    imgData = await res.json();
                }

                await Swal.fire({
                    title: isEdit ? '✏️ แก้ไขรูปภาพ' : '🖼️ เพิ่มรูปภาพใหม่',
                    width: '700px',
                    html: `
                        <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; padding: 20px;">
                            <div class="form-group" style="display: flex; flex-direction: column;"><label>Image ID</label><input type="text" id="swal-img-id" class="cute-edit-input" value="${imgData.image_id}" readonly></div>
                            <div class="form-group" style="display: flex; flex-direction: column;"><label>Location</label><select id="swal-loc-id" class="cute-edit-input">${options}</select></div>
                            
                            <div class="form-group" style="display: flex; flex-direction: column; grid-column: span 2;">
                                <label>Upload Image (เลือกไฟล์รูปภาพสถานที่)</label>
                                <input type="file" id="swal-file" class="cute-edit-input" accept="image/*" style="padding: 8px;">
                            </div>
                        </div>
                    `,
                    didOpen: () => {
                        if (imgData.location_id) document.getElementById('swal-loc-id').value = imgData.location_id;
                    },
                    confirmButtonText: isEdit ? 'UPDATE' : 'ADD',
                    showCancelButton: true,
                    cancelButtonText: 'CANCEL',
                    buttonsStyling: false,
                    customClass: {
                        popup: 'cute-modal-style', title: 'cute-modal-title',
                        confirmButton: 'cute-modal-button', cancelButton: 'cute-modal-button-cancel'
                    },
                    preConfirm: () => {
                        const fileInput = document.getElementById('swal-file');
                        return {
                            image_id: document.getElementById('swal-img-id').value,
                            location_id: document.getElementById('swal-loc-id').value,
                            location_image: fileInput && fileInput.files.length > 0 ? fileInput.files[0] : null
                        }
                    }
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        const method = isEdit ? 'PUT' : 'POST';
                        const url = isEdit ? `${API_BASE_URL}/api/location-images/${id}` : `${API_BASE_URL}/api/location-images`;

                        const formDataToSend = new FormData();
                        formDataToSend.append('image_id', result.value.image_id);
                        formDataToSend.append('location_id', result.value.location_id);

                        if (result.value.location_image) {
                            formDataToSend.append('image', result.value.location_image);
                        }

                        formDataToSend.append('admin_id', localStorage.getItem('adminId') || '1');

                        const response = await fetch(url, {
                            method: method,
                            headers: {
                                'Authorization': `Bearer ${adminToken}`
                            },
                            body: formDataToSend
                        });

                        if (response.ok) {
                            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', confirmButtonColor: '#BF7E46' });
                            fetchImages();
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'บันทึกไม่สำเร็จ',
                                text: errData.message || 'โปรดตรวจสอบสิทธิ์หลังบ้านแอดมิน หรือขนาดไฟล์รูปภาพ'
                            });
                        }
                    }
                });
            } catch (err) { console.error("Modal Operation Failure:", err); }
        }

        // ฟังก์ชันลบ
        async function deleteImage(id) {
            const adminId = localStorage.getItem('adminId');

            Swal.fire({
                title: 'ยืนยันการลบรูปภาพ?',
                text: `คุณต้องการลบรูปภาพรหัส ${id} ใช่หรือไม่?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#FF9A9A',
                confirmButtonText: 'ลบเลย',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/location-images/${id}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${adminToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ admin_id: adminId })
                        });
                        if (response.ok) {
                            Swal.fire({ title: 'ลบสำเร็จ!', icon: 'success', confirmButtonColor: '#BF7E46' });
                            fetchImages();
                        }
                    } catch (err) { console.error(err); }
                }
            });
        }

        // ฟังก์ชัน Logout
        function logoutAdmin() {
            Swal.fire({
                title: 'ออกจากระบบ?',
                text: "คุณต้องการออกจากระบบจัดการใช่หรือไม่",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#BF7E46',
                cancelButtonColor: '#ccc',
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก',
                borderRadius: '20px'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminName');
                    window.location.href = 'admin_login.html';
                }
            });
        }

        window.onload = fetchImages;
    </script>
</body>

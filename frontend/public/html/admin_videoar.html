<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin VideoAR - เส้นทางหัวบ้าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/stylecommon.css">
    <link rel="stylesheet" href="../css/styleadmin_location.css">
    <link rel="stylesheet" href="../css/styleadmin_addedit.css">
</head>

<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo-section"><img src="../image/logohuabaan2.png" class="admin-logo"></div>
            <nav class="menu">
                <a href="admin_dashboard.html" class="menu-item"><iconify-icon icon="mage:dashboard-fill"
                        class="menu-icon"></iconify-icon> Dashboard</a>
                <a href="admin_user.html" class="menu-item"><iconify-icon icon="basil:user-solid"
                        class="menu-icon"></iconify-icon> User</a>
                <a href="admin_otp.html" class="menu-item">
                    <iconify-icon icon="teenyicons:otp-solid" class="menu-icon"></iconify-icon> OTP</a>
                <a href="admin_location.html" class="menu-item"><iconify-icon icon="ion:location-sharp"
                        class="menu-icon"></iconify-icon> Location</a>
                <a href="admin_location_images.html" class="menu-item"><iconify-icon icon="mdi:image-location"
                        class="menu-icon"></iconify-icon> Location Images</a>
                <a href="admin_activity.html" class="menu-item"><iconify-icon icon="lets-icons:date-fill"
                        class="menu-icon"></iconify-icon> Activity</a>
                <a href="admin_activity_images.html" class="menu-item"><iconify-icon icon="material-symbols:imagesmode"
                        class="menu-icon"></iconify-icon> Activity Images</a>
                <a href="admin_history.html" class="menu-item"><iconify-icon icon="mdi:history"
                        class="menu-icon"></iconify-icon> History</a>
                <a href="admin_history_gallery.html" class="menu-item"><iconify-icon icon="material-symbols:topic"
                        class="menu-icon"></iconify-icon> History Gallery</a>
                <a href="admin_videoar.html" class="menu-item active"><iconify-icon icon="tdesign:view-in-ar-filled"
                        class="menu-icon"></iconify-icon> AR Content</a>
                <a href="admin_community_gallery.html" class="menu-item"><iconify-icon
                        icon="fluent:image-copy-28-filled" class="menu-icon"></iconify-icon> Community Gallery</a>
                <a href="admin_banners.html" class="menu-item"><iconify-icon icon="material-symbols:ad-units"
                        class="menu-icon"></iconify-icon> Banner Ads</a>
                <a href="admin_review.html" class="menu-item"><iconify-icon icon="material-symbols:rate-review"
                        class="menu-icon"></iconify-icon> Review</a>
                <a href="admin_map.html" class="menu-item"><iconify-icon icon="mdi:map-marker-radius"
                        class="menu-icon"></iconify-icon> Map</a>
                <a href="admin_travel_route.html" class="menu-item"><iconify-icon icon="mdi:map-outline"
                        class="menu-icon"></iconify-icon> Travel Route</a>
                <a href="admin_trip.html" class="menu-item"><iconify-icon icon="mdi:map-marker-path"
                        class="menu-icon"></iconify-icon> Trips</a>
                <a href="admin_trip_detail.html" class="menu-item"><iconify-icon
                        icon="streamline-ultimate:trip-road-bold" class="menu-icon"></iconify-icon> Trips Details</a>
                <a href="admin_report.html" class="menu-item"><iconify-icon icon="mdi:report"
                        class="menu-icon"></iconify-icon> Report</a>
                <a href="admin_activity_logs.html" class="menu-item">
                    <iconify-icon icon="mdi:note-edit" class="menu-icon"></iconify-icon> Activity Logs
                </a>
                <a href="admin_trash.html" class="menu-item trash-menu">
                    <iconify-icon icon="mdi:trash-can" class="menu-icon"></iconify-icon> Trash
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="divider"></div>
                <a href="javascript:void(0)" class="menu-item logout-btn" onclick="logoutAdmin()"><iconify-icon
                        icon="mdi:logout" class="menu-icon"></iconify-icon> Log Out</a>
            </div>
        </aside>

        <main class="content-area">
            <header class="top-bar">
                <div class="search-wrapper">
                    <iconify-icon icon="material-symbols:search-rounded" class="search-icon"></iconify-icon>
                    <input type="text" placeholder="ค้นหาชื่อวิดีโอ หรือรหัสสถานที่..." id="arSearch"
                        onkeyup="searchARTable()">
                </div>
                <div class="action-controls">
                    <button class="add-btn" onclick="openARModal()">
                        <iconify-icon icon="mdi:add-bold"></iconify-icon> Add Video
                    </button>
                </div>
            </header>

            <div class="table-container">
                <div class="scroll-container">
                    <table id="videoARTable">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Video ID</th>
                                <th>Location</th>
                                <th>Video Name</th>
                                <th>URL</th>
                                <th>Status</th>
                                <th>Index</th>
                            </tr>
                        </thead>
                        <tbody id="videoARData"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';

        // เช็กสิทธิ์ตั๋ว Token ประทับตราจริงจากระบบแอดมินหลังบ้าน
        const adminToken = localStorage.getItem('adminToken');
        if (!adminToken) {
            window.location.href = 'admin_login.html';
        }

        function searchARTable() {
            let input = document.getElementById("arSearch").value.toLowerCase();

            let rows = document.querySelectorAll("#videoARData tr");

            rows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? "" : "none";
            });
        }

        async function fetchVideoAR() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/videoar`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.clear();
                    window.location.href = 'admin_login.html';
                    return;
                }
                const data = await response.json();
                const tbody = document.getElementById('videoARData');
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td class="action-cell">
                            <button class="edit-btn-sm" onclick="openARModal('${item.video_id}')"><iconify-icon icon="material-symbols:edit"></iconify-icon> Edit</button>
                            <button class="delete-btn-sm" onclick="deleteVideoAR('${item.video_id}')"><iconify-icon icon="mdi:delete"></iconify-icon> Delete</button>
                        </td>
                        <td>${item.video_id}</td>
                        <td>${item.location_id}</td>
                        <td>${item.video_name}</td>
                        <td class="url-text">${item.video_url.substring(0, 15)}...</td>
                        <td>
                            <span class="badge ${item.status === 'active' ? 'active' : 'inactive'}">
                                ${item.status === 'active' ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td>${item.target_index}</td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Error fetching VideoAR:", err); }
        }

        async function openARModal(id = null) {
            const isEdit = id !== null;
            let data = {};

            const locRes = await fetch(`${API_BASE_URL}/api/locations`, {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const locs = await locRes.json();
            const locOptions = locs.map(l => `<option value="${l.location_id}">${l.location_name}</option>`).join('');

            if (isEdit) {
                const res = await fetch(`${API_BASE_URL}/api/videoar/${id}`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                data = await res.json();
            } else {
                const res = await fetch(`${API_BASE_URL}/api/videoar/next-id`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const result = await res.json();
                data = {
                    video_id: result.next_id,
                    location_id: '', video_name: '', video_url: '', target_index: '', status: 'active'
                };
            }

            await Swal.fire({
                title: isEdit ? '✏️ แก้ไขวิดีโอ AR' : '🎬 เพิ่มวิดีโอ AR',
                width: '700px',
                customClass: { popup: 'cute-modal-style', title: 'cute-modal-title', confirmButton: 'cute-modal-button', cancelButton: 'cute-modal-button-cancel' },
                buttonsStyling: false,
                html: `
                    <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; padding: 20px;">
                        <div class="form-group" style="display: flex; flex-direction: column;"><label>Video ID</label><input type="text" id="swal-vid" class="cute-edit-input" value="${data.video_id || ''}" readonly></div>
                        <div class="form-group" style="display: flex; flex-direction: column;"><label>Target Index</label><input type="number" id="swal-index" class="cute-edit-input" value="${data.target_index || ''}"></div>
                        
                        <div class="form-group" style="display: flex; flex-direction: column; grid-column: span 2;"><label>Location</label><select id="swal-loc" class="cute-edit-input">${locOptions}</select></div>
                        <div class="form-group" style="display: flex; flex-direction: column; grid-column: span 2;"><label>Video Name</label><input type="text" id="swal-name" class="cute-edit-input" value="${data.video_name || ''}"></div>
                        
                        <div class="form-group" style="display: flex; flex-direction: column; grid-column: span 2;">
                            <label>Upload Video (.mp4 เท่านั้น)</label>
                            <input type="file" id="swal-file" class="cute-edit-input" accept="video/mp4" style="padding: 8px;">
                            ${isEdit && data.video_url ? `<p style="font-size:12px; color:#8C6F5E; margin-top:5px; word-break:break-all;">ไฟล์ปัจจุบัน: ${data.video_url.substring(0, 50)}...</p>` : ''}
                        </div>
                        
                        <div class="form-group" style="display: flex; align-items: center; gap: 15px; grid-column: span 2;">
                            <label>Status</label>
                            <label class="switch">
                                <input type="checkbox" id="swal-status" ${data.status === 'active' ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                            <span id="swal-status-text">${data.status === 'active' ? 'Active' : 'Inactive'}</span>
                        </div>
                    </div>
                `,
                didOpen: () => {
                    if (isEdit && data.location_id) document.getElementById('swal-loc').value = data.location_id;

                    const statusCheckbox = document.getElementById('swal-status');
                    const statusText = document.getElementById('swal-status-text');
                    statusText.textContent = statusCheckbox.checked ? 'Active' : 'Inactive';

                    statusCheckbox.onchange = function () {
                        statusText.textContent = this.checked ? 'Active' : 'Inactive';
                    };
                },
                confirmButtonText: isEdit ? 'UPDATE' : 'ADD',
                showCancelButton: true,
                preConfirm: () => {
                    const fileInput = document.getElementById('swal-file');
                    return {
                        video_id: document.getElementById('swal-vid').value,
                        location_id: document.getElementById('swal-loc').value,
                        video_name: document.getElementById('swal-name').value,
                        target_index: document.getElementById('swal-index').value,
                        status: document.getElementById('swal-status').checked ? 'active' : 'inactive',
                        video_file: fileInput && fileInput.files.length > 0 ? fileInput.files[0] : null
                    }
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const method = isEdit ? 'PUT' : 'POST';
                    const url = isEdit ? `${API_BASE_URL}/api/videoar/${id}` : `${API_BASE_URL}/api/videoar`;

                    const formDataToSend = new FormData();
                    formDataToSend.append('video_id', result.value.video_id);
                    formDataToSend.append('location_id', result.value.location_id);
                    formDataToSend.append('video_name', result.value.video_name);
                    formDataToSend.append('target_index', result.value.target_index);
                    formDataToSend.append('status', result.value.status);

                    if (result.value.video_file) {
                        formDataToSend.append('video', result.value.video_file);
                    }
                    formDataToSend.append('admin_id', localStorage.getItem('adminId') || '1');

                    const res = await fetch(url, {
                        method: method,
                        headers: {
                            'Authorization': `Bearer ${adminToken}`
                        },
                        body: formDataToSend
                    });

                    if (res.ok) {
                        Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', confirmButtonColor: '#BF7E46' });
                        fetchVideoAR();
                    } else {
                        Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: 'โปรดตรวจสอบสิทธิ์หลังบ้านแอดมิน หรือขนาดไฟล์วีดีโอ' });
                    }
                }
            });
        }

        // ฟังก์ชันสำหรับลบข้อมูล
        async function deleteVideoAR(id) {
            const adminId = localStorage.getItem('adminId');

            Swal.fire({
                title: 'ยืนยันการลบ?',
                text: `คุณต้องการลบวิดีโอรหัส ${id} ใช่หรือไม่?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#FF9A9A',
                confirmButtonText: 'ลบเลย',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/videoar/${id}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${adminToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ admin_id: adminId })
                        });

                        if (response.ok) {
                            Swal.fire({ title: 'ลบสำเร็จ!', icon: 'success', confirmButtonColor: '#BF7E46' });
                            fetchVideoAR();
                        } else {
                            Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถลบข้อมูลได้', 'error');
                        }
                    } catch (err) {
                        console.error("Delete Error:", err);
                    }
                }
            });
        }

        function logoutAdmin() {
            Swal.fire({
                title: 'ออกจากระบบ?',
                text: "คุณต้องการออกจากระบบจัดการใช่หรือไม่",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#BF7E46',
                cancelButtonColor: '#ccc',
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก',
                borderRadius: '20px'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminName');
                    window.location.href = 'admin_login.html';
                }
            });
        }

        window.onload = fetchVideoAR;
    </script>
</body>

</html>

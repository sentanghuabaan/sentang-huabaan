<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - เส้นทางหัวบ้าน</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="../css/stylelogin-register.css">
</head>

<body class="mobile-container">
    <header class="login-header">
        <button class="close-btn" onclick="history.back()">
            <iconify-icon icon="material-symbols:arrow-back-ios-new-rounded"></iconify-icon>
        </button>
        <div class="logo-wrapper">
            <img src="../image/logohuabaan.png" alt="เส้นทางหัวบ้าน" class="login-logo">
        </div>
    </header>

    <main class="login-content">
        <h2 class="login-title">ลืมรหัสผ่าน</h2>

        <form id="forgotForm" class="login-form" autocomplete="off">
            <p class="instruction-text">กรุณากรอกอีเมลของคุณเพื่อรับรหัสยืนยัน</p>
            <div class="input-group">
                <input type="email" id="email" placeholder="อีเมลของคุณ" required>
            </div>
            <div id="errorEmail" class="error-text"></div> <button type="submit"
                class="submit-btn">ส่งรหัสยืนยัน</button>
        </form>

        <form id="otpForm" class="login-form" style="display: none;" autocomplete="off">
            <p class="otp-instruction">เราได้ส่งรหัสยืนยันไปยังอีเมลของคุณแล้ว</p>
            <div class="input-group otp-inputs-wrapper">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
                <input type="text" class="otp-field" maxlength="1">
            </div>
            <div id="errorOTP" class="error-text"></div> <button type="submit"
                class="submit-btn verify-btn">ตรวจสอบรหัส</button>
        </form>

        <form id="resetPasswordForm" class="login-form" style="display: none;" autocomplete="off">
            <p class="instruction-text">รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวขึ้นไป</p>

            <div class="input-group"> <input type="password" id="newPassword" placeholder="รหัสผ่านใหม่" required>
            </div>

            <div class="input-group"> <input type="password" id="confirmPassword" placeholder="ยืนยันรหัสผ่านใหม่"
                    required>
            </div>

            <div id="errorReset" class="error-text"></div> <button type="submit"
                class="submit-btn reset-finish-btn">บันทึกรหัสผ่านใหม่</button>
        </form>
    </main>

    <div id="customModal" class="modal-overlay">
        <div class="modal-box">
            <iconify-icon id="modalIcon" icon="" style="font-size: 50px; margin-bottom: 15px;"></iconify-icon>
            <p id="modalMessage"></p>
            <button class="modal-btn" onclick="closeModal()">ตกลง</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';

        const modal = document.getElementById('customModal');
        const modalMessage = document.getElementById('modalMessage');
        const modalIcon = document.getElementById('modalIcon');
        let successRedirect = false;

        function showModal(message, type) {
            modalMessage.innerHTML = message;
            modal.style.display = 'flex';

            if (type === 'success') {
                modalIcon.icon = "ep:success-filled";
                modalIcon.style.color = "#4CAF50";
                successRedirect = true;
            } else {
                modalIcon.icon = "material-symbols:error";
                modalIcon.style.color = "#d9534f";
                successRedirect = false;
            }
        }

        function closeModal() {
            modal.style.display = 'none';
            if (successRedirect) {
                // เมื่อเปลี่ยนรหัสสำเร็จ ให้เด้งกลับไปหน้า login
                window.location.href = 'login.html';
            }
        }

        let userEmail = "";
        let validOTP = "";

        function setFormError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        // ขอ OTP
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('errorEmail').style.display = 'none';
            userEmail = document.getElementById('email').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('forgotForm').style.display = 'none';
                    document.getElementById('otpForm').style.display = 'block';
                } else {
                    setFormError('errorEmail', data.message);
                }
            } catch (error) { setFormError('errorEmail', 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'); }
        });

        // ควบคุมช่อง OTP ให้เลื่อนอัตโนมัติ
        const otpInputs = document.querySelectorAll(".otp-field");
        otpInputs.forEach((input, index) => {
            input.addEventListener("input", (e) => {
                if (e.target.value.length > 0 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && e.target.value.length === 0 && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        // ตรวจสอบ OTP 
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorOTP = document.getElementById('errorOTP');
            errorOTP.style.display = 'none';

            validOTP = Array.from(otpInputs).map(i => i.value).join("");

            if (validOTP.length < 6) {
                return setFormError('errorOTP', 'กรุณากรอกรหัสให้ครบ 6 หลัก');
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/verify-otp-only`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp_code: validOTP })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('otpForm').style.display = 'none';
                    document.getElementById('resetPasswordForm').style.display = 'block';
                    document.querySelector('.login-title').textContent = 'ตั้งรหัสผ่านใหม่';
                } else {
                    setFormError('errorOTP', data.message);
                }
            } catch (error) { setFormError('errorOTP', 'เกิดข้อผิดพลาดในการเชื่อมต่อ'); }
        });

        // ตอนบันทึกรหัสใหม่
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('errorReset').style.display = 'none';

            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass.length < 6) return setFormError('errorReset', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัว');
            if (newPass !== confirmPass) return setFormError('errorReset', 'รหัสผ่านไม่ตรงกัน');

            try {
                const response = await fetch(`${API_BASE_URL}/api/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: userEmail,
                        newPassword: newPass
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    return setFormError('errorReset', errorData.message || 'เกิดข้อผิดพลาดจากเซิร์ฟเวอร์');
                }

                const data = await response.json();
                if (data.success) {
                    successRedirect = true;
                    showModal('เปลี่ยนรหัสผ่านสำเร็จ!', 'success');
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                setFormError('errorReset', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            }
        });

    </script>
</body>

</html>

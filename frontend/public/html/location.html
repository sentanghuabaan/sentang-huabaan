<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานที่ - เส้นทางหัวบ้าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="../css/stylelocation.css">
    <link rel="stylesheet" href="../css/stylefooter.css">
    <link rel="stylesheet" href="../css/responsive-nav.css">
</head>

<body class="mobile-container">
    <header class="home-header">
        <img src="../image/logohuabaan.png" alt="logo" class="home-logo">

        <nav class="nav-menu-desktop">
            <ul>
                <li><a href="../index.html" class="menu-item">หน้าแรก</a></li>
                <li><a href="history.html" class="menu-item">ประวัติ</a></li>
                <li><a href="location.html" class="menu-item active">สถานที่</a></li>
                <li><a href="activity.html" class="menu-item">กิจกรรม</a></li>
                <li><a href="trip-planner.html" class="menu-item">วางแผนการเดินทาง</a></li>
                <li><a href="map-recommend.html" class="menu-item">แผนที่แนะนำ</a></li>
            </ul>
        </nav>

        <div class="user-profile-header" id="user-auth-section">
            <a href="login.html" class="login-trigger" id="user-link">
                <img id="header-user-avatar" src="" alt="Profile"
                    style="display: none; width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #BF7E46;">

                <iconify-icon id="default-user-icon" icon="mdi:user-circle"></iconify-icon>
            </a>
        </div>
        <a href="menu.html" class="menu-trigger">
            <iconify-icon icon="material-symbols:menu-rounded"></iconify-icon>
        </a>
    </header>

    <div class="container">
        <h2 class="title">สถานที่</h2>

        <div id="card-container" class="card-list">
        </div>

        <button id="load-more-btn" class="btn-view-all">ดูทั้งหมด</button>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';

        function updateUserProfileHeader() {
            const userStr = localStorage.getItem('user');
            const userLink = document.getElementById('user-link');
            const userAvatar = document.getElementById('header-user-avatar');
            const defaultIcon = document.getElementById('default-user-icon');

            if (userStr) {
                const userData = JSON.parse(userStr);
                userLink.href = "profile.html";

                if (userData.profile_img) {

                    const imgUrl = userData.profile_img.startsWith('http')
                        ? userData.profile_img
                        : `${API_BASE_URL}/${userData.profile_img}`;

                    userAvatar.src = imgUrl;
                    userAvatar.style.display = 'block';
                    defaultIcon.style.display = 'none';
                } else {
                    // หากระบบจริงไม่มีรูป ให้ซ่อนรูปภาพและแสดงไอคอนเริ่มต้นแทน
                    userAvatar.style.display = 'none';
                    defaultIcon.style.display = 'block';
                }
            } else {
                // กรณีที่ยังไม่ได้ล็อกอิน ให้กลับไปหน้า Login
                userLink.href = "login.html";
                userAvatar.style.display = 'none';
                defaultIcon.style.display = 'block';
            }
        }

        let allLocations = [];
        let currentIndex = 0;
        const container = document.getElementById('card-container');
        const btnViewAll = document.getElementById('load-more-btn');


        async function fetchAndRender() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/locations`);
                allLocations = await response.json();

                console.log("ข้อมูลที่ได้จาก DB:", allLocations[0]);

                const initialCount = window.innerWidth >= 768 ? 8 : 5;

                renderCards(initialCount);

            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function renderCards(count) {
            const nextBatch = allLocations.slice(currentIndex, currentIndex + count);

            const now = new Date();
            const dayOfWeek = now.getDay();
            const dayNames = ["วันอาทิตย์", "วันจันทร์", "วันอังคาร", "วันพุธ", "วันพฤหัสบดี", "วันศุกร์", "วันเสาร์"];
            const todayThai = dayNames[dayOfWeek];
            const currentTotalMinutes = (now.getHours() * 60) + now.getMinutes();

            nextBatch.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                const locId = item.location_id;
                card.onclick = () => {
                    window.location.href = `locationdetail.html?id=${locId}`;
                };

                // --- Logic การเช็ค วัน และ เวลา (เก็บไว้คำนวณแต่ไม่โชว์ตัวเลข) ---
                let isDayOpen = false;
                const opDays = item.operating_days || "";
                if (opDays === "ทุกวัน") {
                    isDayOpen = true;
                } else if (opDays.includes("ยกเว้น")) {
                    const exceptDay = opDays.replace("ยกเว้น", "").trim();
                    isDayOpen = (todayThai !== exceptDay);
                } else if (opDays.includes("ทุกวัน")) {
                    const targetDay = opDays.replace("ทุก", "").trim();
                    isDayOpen = (todayThai === targetDay);
                } else {
                    isDayOpen = opDays.includes(todayThai);
                }

                const timeToMinutes = (t) => {
                    if (!t) return null;
                    const p = t.split(':');
                    return (parseInt(p[0]) * 60) + parseInt(p[1]);
                };
                const openMin = timeToMinutes(item.opening_time);
                const closeMin = timeToMinutes(item.closing_time);

                let isTimeOpen = false;
                if (openMin !== null && closeMin !== null) {
                    isTimeOpen = (currentTotalMinutes >= openMin && currentTotalMinutes < closeMin);
                }

                // สรุปสถานะเพื่อเลือก Class และ Text
                const isOpen = isDayOpen && isTimeOpen;
                const statusClass = isOpen ? 'status-open' : 'status-closed';
                const statusText = isOpen ? 'เปิด' : 'ปิด';

                const fileName = item.location_url;
                const locationName = item.location_name;
                const imageUrl = fileName ?
                    (fileName.trim().startsWith('http') ? fileName.trim() : `${API_BASE_URL}/${fileName.trim()}`)
                    : 'https://via.placeholder.com/400x200?text=No+Data';

                card.innerHTML = `
            <img src="${imageUrl}" alt="${locationName}">
            <div class="card-content">
                <span class="place-name">${locationName}</span>
                <span class="status-badge ${statusClass}">${statusText}</span>
            </div>
        `;
                container.appendChild(card);
            });

            currentIndex += count;
            if (currentIndex >= allLocations.length) {
                btnViewAll.style.display = 'none';
            }
        }

        btnViewAll.addEventListener('click', () => {
            renderCards(12);
        });

        function loadFooter() {
            fetch('footer.html')
                .then(response => response.text())
                .then(data => {
                    const footerPlaceholder = document.getElementById('footer-placeholder');
                    footerPlaceholder.innerHTML = data;

                    const footerLogo = footerPlaceholder.querySelector('.footer-logo');
                    if (footerLogo) {
                        footerLogo.src = '../image/logohuabaan2.png';
                    }
                })
                .catch(error => console.error('Error loading footer:', error));
        }

        window.onload = fetchAndRender;
        let reviews = [];

        updateUserProfileHeader();
        loadFooter();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการลงโฆษณา - เส้นทางหัวบ้าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="../css/style-myads.css">
</head>

<body class="mobile-container">
    <header class="login-header">
        <button class="close-btn" onclick="location.href='profile.html'">
            <iconify-icon icon="weui:back-filled"></iconify-icon>
        </button>
        <div class="logo-wrapper">
            <img src="../image/logohuabaan.png" alt="เส้นทางหัวบ้าน" class="login-logo">
        </div>
        <div class="header-divider"></div>
    </header>

    <main class="login-content">
        <h2 class="login-title">ประวัติการลงโฆษณา</h2>

        <div class="filter-tabs">
            <button class="tab active" onclick="filterAds('all', this)">ทั้งหมด</button>
            <button class="tab" onclick="filterAds('pending', this)">รอตรวจ</button>
            <button class="tab" onclick="filterAds('approved', this)">อนุมัติแล้ว</button>
            <button class="tab" onclick="filterAds('rejected', this)">ไม่ผ่าน</button>
        </div>

        <div id="adsContainer" class="ads-list">
            <div class="empty-state">กำลังโหลดข้อมูล...</div>
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:3000';

        let allAds = [];

        document.addEventListener("DOMContentLoaded", async function () {
            const userData = localStorage.getItem('user');
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userData);
            const container = document.getElementById('adsContainer');

            try {
                const response = await fetch(`${API_BASE_URL}/api/banners/user/${user.user_id}`);
                allAds = await response.json();

                renderAds(allAds);

            } catch (error) {
                console.error("Fetch Error:", error);
                container.innerHTML = '<div class="empty-state">ไม่สามารถโหลดข้อมูลได้</div>';
            }
        });

        // ฟังก์ชันสำหรับกรองข้อมูล
        function filterAds(status, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            if (status === 'all') {
                renderAds(allAds);
            } else {
                const filtered = allAds.filter(ad => ad.status === status);
                renderAds(filtered);
            }
        }

        // ฟังก์ชันสำหรับวาด HTML การ์ดโฆษณา
        function renderAds(adsList) {
            const container = document.getElementById('adsContainer');

            if (adsList.length === 0) {
                container.innerHTML = `
            <div class="empty-state">
                <iconify-icon icon="mdi:advertisement-off" style="font-size: 50px;"></iconify-icon>
                <p>ไม่พบรายการที่ตรงกับเงื่อนไข</p>
            </div>`;
                return;
            }

            container.innerHTML = adsList.map(ad => {
                let statusClass = 'status-pending';
                let statusText = 'รอตรวจสอบ';
                if (ad.status === 'approved') { statusClass = 'status-approved'; statusText = 'อนุมัติแล้ว'; }
                if (ad.status === 'rejected') { statusClass = 'status-rejected'; statusText = 'ไม่ผ่านการอนุมัติ'; }

                const imgUrl = (ad.image_url && ad.image_url.trim().startsWith('http'))
                    ? ad.image_url.trim()
                    : `${API_BASE_URL}/${ad.image_url}`;

                return `
            <div class="ad-item">
                <img src="${imgUrl}" class="ad-img" onerror="this.src='../image/logohuabaan.png'">
                <div class="ad-details">
                    <h4>${ad.title}</h4>
                    <p>${ad.description}</p>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                    
                    ${ad.status === 'rejected' && ad.admin_note ? `
                        <div class="admin-note">
                            <strong>เหตุผลจากแอดมิน:</strong><br>
                            ${ad.admin_note}
                        </div>
                    ` : ''}

                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 8px;">
                        <p style="font-size: 11px; margin: 0; color: #999;">
                            วันที่ลงประกาศ: ${new Date(ad.created_at).toLocaleDateString('th-TH')}
                        </p>
                        <button class="delete-ad-btn" onclick="deleteMyAd('${ad.banner_id}', '${ad.status}')" title="ลบโฆษณา"
                            style="background: none; border: none; color: #d9534f; cursor: pointer; font-size: 20px; padding: 0 4px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">
                            <iconify-icon icon="mdi:trash-can-outline"></iconify-icon>
                        </button>
                    </div>

                </div>
            </div>
        `;
            }).join('');
        }

        // ฟังก์ชันสั่งลบโฆษณาตนเอง
        async function deleteMyAd(bannerId, currentStatus) {
            const userData = localStorage.getItem('user');
            if (!userData) return;
            const user = JSON.parse(userData);"รายการคำขอนี้จะถูกยกเลิกและย้ายไปถังขยะระบบ";
            if (currentStatus === 'approved') {
                warningText = "⚠️ โฆษณานี้ได้รับการอนุมัติแล้ว หากลบออกแบนเนอร์จะหยุดแสดงผลบนหน้าแรกทันที!";
            }

            Swal.fire({
                title: 'ยืนยันการลบโฆษณา?',
                html: `${warningText}<br><small style="color: #888;">(ข้อมูลโฆษณาจะถูกซ่อนออกจากหน้าเว็บหลัก)</small>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#BF7E46',
                cancelButtonColor: '#7f8c8d',
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก',
                background: '#FBEDD6',
                color: '#5C4033',
                borderRadius: '20px'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/banners/user-delete/${bannerId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: user.user_id })
                        });

                        const resData = await response.json();

                        if (response.ok) {
                            Swal.fire({
                                icon: 'success',
                                title: 'ลบรายการสำเร็จ',
                                text: 'ยกเลิกการเผยแพร่แบนเนอร์ของคุณเรียบร้อยแล้ว',
                                confirmButtonColor: '#BF7E46',
                                background: '#FBEDD6',
                                color: '#5C4033',
                                borderRadius: '20px'
                            }).then(() => {
                                location.reload();
                            });
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'เกิดข้อผิดพลาด',
                                text: resData.error || 'ไม่สามารถสั่งลบโฆษณาได้ในขณะนี้',
                                confirmButtonColor: '#d9534f',
                                background: '#FBEDD6',
                                color: '#5C4033'
                            });
                        }
                    } catch (err) {
                        console.error("Delete Ad Request Error:", err);
                        Swal.fire({
                            icon: 'error',
                            title: 'เชื่อมต่อล้มเหลว',
                            text: 'เกิดปัญหาขัดข้องทางเทคนิคในการติดต่อเซิร์ฟเวอร์ฐานข้อมูล',
                            confirmButtonColor: '#d9534f',
                            background: '#FBEDD6',
                            color: '#5C4033'
                        });
                    }
                }
            });
        }
    </script>
</body>

</html>
